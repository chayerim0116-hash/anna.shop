<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANNA</title>
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: #ffffff;
            font-family: "Noto Sans KR", sans-serif;
            color: #111111;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 상단 안내 */
        .esc-hint {
            position: fixed;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            height: 44px;
            padding: 0 36px;
            border: 1px solid rgba(0,0,0,0.06);
            background: rgba(0,0,0,0.02);
            color: rgba(0,0,0,0.3);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .esc-hint kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1px 5px;
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 3px;
            font-family: inherit;
            font-size: 12px;
            color: rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.04);
            margin: 0 3px;
        }

        /* 페이지 wrapper */
        .kakao-page {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 로고 */
        .kakao-logo {
            font-size: 30px;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: #111111;
            text-align: center;
            margin-bottom: 32px;
        }

        /* 로그인 박스 */
        .kakao-login-box {
            width: 520px;
            max-width: calc(100vw - 40px);
            min-height: 420px;
            border: 1px solid #eeeeee;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            padding: 56px 64px 46px;
            border-radius: 0;
        }

        /* 입력창 */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .input-group input {
            width: 100%;
            height: 48px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0,0,0,0.18);
            color: #111111;
            font-family: "Noto Sans KR", sans-serif;
            font-size: 15px;
            outline: none;
            padding: 0;
        }

        .input-group input + input {
            margin-top: 20px;
        }

        .input-group input::placeholder {
            color: #aaaaaa;
        }

        .input-group input:focus {
            border-bottom-color: #111111;
        }

        /* 간편로그인 저장 */
        .save-login {
            margin-top: 22px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888888;
            font-size: 13px;
            cursor: pointer;
        }

        .save-checkbox {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid #cccccc;
            background: transparent;
            flex-shrink: 0;
        }

        /* 로그인 버튼 */
        .btn-login {
            width: 100%;
            height: 46px;
            background: #ff9691;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: "Noto Sans KR", sans-serif;
            cursor: pointer;
            margin-bottom: 18px;
        }

        .btn-login:hover {
            background: #ff8a85;
        }

        /* 구분선 */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #cccccc;
            font-size: 13px;
            margin: 14px 0 18px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eeeeee;
        }

        /* QR코드 버튼 */
        .btn-qr {
            width: 100%;
            height: 46px;
            background: #f5f5f5;
            color: #333333;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: "Noto Sans KR", sans-serif;
            cursor: pointer;
        }

        .btn-qr:hover {
            background: #eeeeee;
        }

        /* 하단 링크 */
        .bottom-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
            font-size: 13px;
        }

        .bottom-links a {
            color: #444444;
            text-decoration: none;
        }

        .bottom-links a:hover {
            text-decoration: underline;
        }

        .bottom-links-right {
            display: flex;
            gap: 14px;
        }

        /* 푸터 */
        .kakao-footer {
            margin-top: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 18px;
            color: #aaaaaa;
            font-size: 12px;
        }

        .kakao-footer a {
            color: #aaaaaa;
            text-decoration: none;
        }

        .kakao-footer a:hover {
            text-decoration: underline;
        }

        .kakao-footer .privacy {
            font-weight: 600;
        }

        .lang-select {
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
        }

        /* 모바일 */
        @media (max-width: 768px) {
            .kakao-login-box {
                padding: 36px 24px 32px;
            }
        }
    </style>
</head>
<body>
    <div class="esc-hint">전체 화면을 종료하려면 <kbd>esc</kbd> 키를 길게 누르세요.</div>

    <div class="kakao-page">
        <div class="kakao-logo">kakao</div>

        <div class="kakao-login-box">
            <div class="input-group">
                <input type="text" placeholder="카카오메일 아이디, 이메일, 전화번호" autocomplete="username">
                <input type="password" placeholder="비밀번호" autocomplete="current-password">
            </div>

            <label class="save-login">
                <span class="save-checkbox"></span>
                간편로그인 정보 저장 ⓘ
            </label>

            <button class="btn-login" type="button">로그인</button>

            <div class="divider">또는</div>

            <button class="btn-qr" type="button">QR코드 로그인</button>

            <div class="bottom-links">
                <a href="#none">회원가입</a>
                <div class="bottom-links-right">
                    <a href="#none">계정 찾기</a>
                    <a href="#none">비밀번호 찾기</a>
                </div>
            </div>
        </div>

        <div class="kakao-footer">
            <span class="lang-select">한국어 ˅</span>
            <a href="#none">이용약관</a>
            <a href="#none" class="privacy">개인정보 처리방침</a>
            <a href="#none">고객센터</a>
            <span>© Kakao Corp.</span>
        </div>
    </div>
</body>
</html>
