<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANNA 상담 채팅</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #2f3138;
            font-family: "Noto Sans KR", sans-serif;
            color: #ffffff;
        }

        .chat-page {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #2f3138;
        }

        /* 헤더 */
        .chat-header {
            height: 120px;
            background: #2b2d34;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .chat-brand {
            color: #ffffff;
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1;
        }

        .chat-response-info {
            color: #b7bcc7;
            font-size: 18px;
            font-weight: 400;
        }

        .chat-header-icons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .chat-header-icons span {
            color: rgba(255,255,255,0.7);
            font-size: 22px;
            cursor: pointer;
            user-select: none;
        }

        .chat-header-icons span:hover {
            color: #ffffff;
        }

        .btn-reset-chat {
            height: 34px;
            padding: 0 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.25);
            background: transparent;
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            font-family: "Noto Sans KR", sans-serif;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-reset-chat:hover {
            border-color: rgba(255,255,255,0.5);
            color: #ffffff;
        }

        /* 채팅 메시지 영역 */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 48px 32px 32px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: #2f3138;
        }

        .chat-body::-webkit-scrollbar {
            width: 4px;
        }

        .chat-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
        }

        /* 봇 메시지 행 */
        .msg-row-bot {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        /* 봇 프로필 */
        .bot-profile {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #ffffff;
            color: #222222;
            font-size: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .bot-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bot-name {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            font-weight: 400;
        }

        /* 봇 말풍선 */
        .bubble-bot {
            max-width: 520px;
            background: #4a4b52;
            color: #ffffff;
            border-radius: 22px 22px 22px 4px;
            padding: 16px 20px;
            font-size: 18px;
            line-height: 1.5;
            word-break: keep-all;
        }

        /* 초기 봇 말풍선 (더 큰 패딩) */
        .bubble-bot-welcome {
            max-width: 520px;
            background: #4a4b52;
            color: #ffffff;
            border-radius: 24px;
            padding: 26px 30px;
            font-size: 22px;
            line-height: 1.55;
            word-break: keep-all;
        }

        /* 알림받기 버튼 */
        .btn-notify {
            width: 100%;
            height: 58px;
            margin-top: 24px;
            border-radius: 14px;
            border: 1px solid #4a78c8;
            background: transparent;
            color: #4a78c8;
            font-size: 20px;
            font-weight: 700;
            font-family: "Noto Sans KR", sans-serif;
            cursor: pointer;
            display: block;
        }

        .btn-notify:hover {
            background: rgba(74, 120, 200, 0.1);
        }

        /* 사용자 메시지 행 */
        .msg-row-user {
            display: flex;
            justify-content: flex-end;
        }

        /* 사용자 말풍선 */
        .bubble-user {
            max-width: 520px;
            background: #fee500;
            color: #111111;
            border-radius: 22px 22px 4px 22px;
            padding: 16px 20px;
            font-size: 18px;
            line-height: 1.5;
            word-break: keep-all;
        }

        /* 입력 중 표시 */
        .typing-indicator {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .typing-dots {
            background: #4a4b52;
            border-radius: 22px 22px 22px 4px;
            padding: 14px 20px;
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            font-style: italic;
        }

        /* 하단 입력 영역 */
        .chat-input-area {
            height: 110px;
            background: #35373f;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 32px;
            flex-shrink: 0;
        }

        .tool-icons {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .tool-icons span {
            font-size: 22px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            user-select: none;
            line-height: 1;
        }

        .tool-icons span:hover {
            color: rgba(255,255,255,0.8);
        }

        .chat-textarea {
            flex: 1;
            height: 64px;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: #ffffff;
            font-size: 22px;
            font-family: "Noto Sans KR", sans-serif;
            line-height: 1.4;
        }

        .chat-textarea::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .btn-send {
            width: 110px;
            height: 58px;
            border-radius: 14px;
            border: none;
            background: #5a5c63;
            color: #8b9098;
            font-size: 20px;
            font-weight: 600;
            font-family: "Noto Sans KR", sans-serif;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }

        .btn-send.active {
            background: #fee500;
            color: #111111;
        }

        /* 모바일 */
        @media (max-width: 768px) {
            .chat-header {
                height: 96px;
                padding: 16px 20px;
            }

            .chat-brand {
                font-size: 26px;
            }

            .chat-response-info {
                font-size: 14px;
            }

            .chat-body {
                padding: 24px 16px 16px;
            }

            .bubble-bot-welcome {
                font-size: 17px;
                padding: 20px 20px;
            }

            .bubble-bot,
            .bubble-user {
                max-width: 78%;
                font-size: 15px;
            }

            .btn-notify {
                font-size: 16px;
                height: 48px;
            }

            .chat-input-area {
                height: 92px;
                padding: 12px 16px;
                gap: 10px;
            }

            .chat-textarea {
                font-size: 17px;
                height: 52px;
            }

            .btn-send {
                width: 78px;
                height: 48px;
                font-size: 16px;
            }

            .tool-icons span {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
<div class="chat-page">

    <!-- 헤더 -->
    <div class="chat-header">
        <div class="chat-header-left">
            <div class="chat-brand">ANNA</div>
            <div class="chat-response-info">보통 6시간 내 응답, 응답률 98%</div>
        </div>
        <div class="chat-header-icons">
            <button class="btn-reset-chat" type="button" id="btnResetChat">대화 초기화</button>
            <span title="알림">🔔</span>
            <span title="메뉴">☰</span>
        </div>
    </div>

    <!-- 채팅 메시지 영역 -->
    <div class="chat-body" id="chatBody">
        <!-- 초기 메시지는 JS로 렌더링 -->
    </div>

    <!-- 하단 입력 영역 -->
    <div class="chat-input-area">
        <div class="tool-icons">
            <span title="이미지">🖼️</span>
            <span title="전화">📞</span>
            <span title="이모지">😊</span>
        </div>
        <textarea
            class="chat-textarea"
            id="chatInput"
            placeholder="가볍게 대화를 시작하세요."
            rows="2"
        ></textarea>
        <button class="btn-send" id="btnSend" type="button">전송</button>
    </div>

</div>

<script>
    const STORAGE_KEY = 'anna_chat_messages';
    const chatBody = document.getElementById('chatBody');
    const chatInput = document.getElementById('chatInput');
    const btnSend = document.getElementById('btnSend');

    /* ── 자동응답 ── */
    const AUTO_REPLIES = [
        { keywords: ['배송'],    reply: '배송 관련 문의를 남겨주셨네요.\n주문 상품은 결제 완료 후 순차적으로 출고됩니다.' },
        { keywords: ['교환','환불'], reply: '교환/환불 문의를 남겨주셨네요.\n상품 수령 후 기간과 상품 상태에 따라 접수가 가능합니다.' },
        { keywords: ['사이즈'], reply: '사이즈 문의를 남겨주셨네요.\n상품 상세페이지의 실측 사이즈를 먼저 확인해주세요.' },
        { keywords: ['재입고'], reply: '재입고 문의를 남겨주셨네요.\n인기 상품은 재입고 일정이 유동적일 수 있습니다.' },
        { keywords: ['주문'],   reply: '주문 관련 문의를 남겨주셨네요.\n주문번호를 함께 남겨주시면 더 빠르게 확인할 수 있습니다.' },
    ];

    function getReply(text) {
        for (const { keywords, reply } of AUTO_REPLIES) {
            if (keywords.some(k => text.includes(k))) return reply;
        }
        return '문의 감사합니다.\n남겨주신 내용을 확인 후 순차적으로 답변드릴게요.';
    }

    /* ── localStorage ── */
    function loadMessages() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
    }

    function saveMessages(msgs) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
    }

    /* ── DOM 헬퍼 ── */
    function scrollBottom() {
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    function renderWelcome() {
        const row = document.createElement('div');
        row.className = 'msg-row-bot';
        row.innerHTML = `
            <div class="bot-profile">ANNA</div>
            <div class="bot-info">
                <div class="bot-name">ANNA</div>
                <div class="bubble-bot-welcome">
                    안녕하세요.<br>ANNA 입니다.<br><br>
                    궁금한 상품, 배송, 교환/환불 문의가 있으시면<br>메시지를 남겨주세요.
                    <button class="btn-notify" type="button" onclick="alert('알림 신청이 완료되었습니다.')">ANNA 알림받기</button>
                </div>
            </div>`;
        chatBody.appendChild(row);
    }

    function renderUserBubble(text) {
        const row = document.createElement('div');
        row.className = 'msg-row-user';
        const bubble = document.createElement('div');
        bubble.className = 'bubble-user';
        bubble.textContent = text;
        row.appendChild(bubble);
        chatBody.appendChild(row);
        scrollBottom();
    }

    function renderBotBubble(text) {
        const row = document.createElement('div');
        row.className = 'msg-row-bot';
        row.innerHTML = `
            <div class="bot-profile">ANNA</div>
            <div class="bot-info">
                <div class="bot-name">ANNA</div>
                <div class="bubble-bot">${text.replace(/\n/g, '<br>')}</div>
            </div>`;
        chatBody.appendChild(row);
        scrollBottom();
    }

    function showTyping() {
        const el = document.createElement('div');
        el.className = 'typing-indicator';
        el.id = 'typingEl';
        el.innerHTML = `
            <div class="bot-profile">ANNA</div>
            <div class="typing-dots">ANNA 상담봇이 입력 중입니다...</div>`;
        chatBody.appendChild(el);
        scrollBottom();
        return el;
    }

    /* ── 초기 렌더링 ── */
    function init() {
        const saved = loadMessages();
        renderWelcome();

        if (saved.length > 0) {
            saved.forEach(({ type, text }) => {
                if (type === 'user') renderUserBubble(text);
                else renderBotBubble(text);
            });
        }
        scrollBottom();
    }

    /* ── 메시지 전송 ── */
    function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        chatInput.value = '';
        updateSendBtn();

        renderUserBubble(text);

        const saved = loadMessages();
        saved.push({ type: 'user', text });
        saveMessages(saved);

        const typingEl = showTyping();

        setTimeout(() => {
            typingEl.remove();

            const reply = getReply(text);
            renderBotBubble(reply);

            saved.push({ type: 'bot', text: reply });
            saveMessages(saved);
        }, 800);
    }

    /* ── 전송 버튼 활성화 ── */
    function updateSendBtn() {
        if (chatInput.value.trim()) {
            btnSend.classList.add('active');
        } else {
            btnSend.classList.remove('active');
        }
    }

    /* ── 이벤트 ── */
    chatInput.addEventListener('input', updateSendBtn);

    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    btnSend.addEventListener('click', sendMessage);

    /* ── 대화 초기화 ── */
    var btnReset = document.getElementById('btnResetChat');
    if (btnReset) {
        btnReset.addEventListener('click', function () {
            if (!confirm('대화 내용을 모두 삭제할까요?')) return;
            localStorage.removeItem(STORAGE_KEY);
            chatBody.innerHTML = '';
            renderWelcome();
        });
    }

    init();
</script>
</body>
</html>
